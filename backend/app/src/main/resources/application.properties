spring.application.name=app

# Porta do servidor
server.port=8080

#
# Banco de dados (configure via variáveis de ambiente)
# - DB_URL: jdbc:postgresql://localhost:5432/clinica
# - DB_USERNAME: postgres
# - DB_PASSWORD: <sua senha>
#
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/clinica}
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.main.allow-bean-definition-overriding=true

# Logging
logging.level.org.springframework=${LOG_SPRING_LEVEL:INFO}
logging.level.com.ag.app=${LOG_APP_LEVEL:INFO}
logging.level.org.hibernate=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/app.log
logging.file.max-size=10MB
logging.file.max-history=10

# JWT
#
# Em produção, DEFINA `JWT_SECRET` (min 32+ chars) via env.
# Para testes locais, cai num default seguro o bastante para desenvolvimento.
#
app.jwt.secret=${JWT_SECRET:dev-only-change-me-please-32chars-minimum!!}
app.jwt.expiration=${JWT_EXPIRATION_MILLIS:3600000}