<div class="d-flex">
  <!-- Sidebar -->
  <nav [class.sidebar]="sidebarOpen" [class.sidebar-closed]="!sidebarOpen">
    <div class="sidebar-header d-flex justify-content-between align-items-center">
      <h3>Cadastro Médico</h3>
      <button class="btn btn-sm btn-outline-primary" (click)="toggleSidebar()">
        <i class="fas fa-bars"></i>
      </button>
    </div>

    <ul class="nav flex-column mt-3">
      <li class="nav-item" *ngIf="!isPaciente">
        <a class="nav-link" routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
          <i class="fas fa-home"></i>
          <span *ngIf="sidebarOpen">Dashboard</span>
        </a>
      </li>
      <li class="nav-item" *ngIf="!isPaciente">
        <a class="nav-link" routerLink="/pacientes" routerLinkActive="active">
          <i class="fas fa-user-injured"></i>
          <span *ngIf="sidebarOpen">Pacientes</span>
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" routerLink="/doutores" routerLinkActive="active">
          <i class="fas fa-user-md"></i>
          <span *ngIf="sidebarOpen">Doutores</span>
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" routerLink="/consultas" routerLinkActive="active">
          <i class="fas fa-calendar-alt"></i>
          <span *ngIf="sidebarOpen">Consultas</span>
        </a>
      </li>
      <li class="nav-item" *ngIf="isAdmin">
        <a class="nav-link" routerLink="/usuarios" routerLinkActive="active">
          <i class="fas fa-users-cog"></i>
          <span *ngIf="sidebarOpen">Usuários</span>
        </a>
      </li>
      <li class="nav-item" *ngIf="!isPaciente">
        <a class="nav-link" routerLink="/empresas" routerLinkActive="active">
          <i class="fas fa-building"></i>
          <span *ngIf="sidebarOpen">Empresas</span>
        </a>
      </li>
    </ul>

    <hr class="mt-auto mx-3 border-opacity-25" />

    <div class="user-menu mb-3">
      <button class="btn btn-danger w-100 rounded-pill shadow-sm" (click)="logout()">
        <i class="fas fa-sign-out-alt"></i>
        <span *ngIf="sidebarOpen" class="ms-2">Sair do Sistema</span>
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="main-content">
    <header class="navbar navbar-expand-lg navbar-light bg-light shadow-sm sticky-top mb-4">
      <div class="container-fluid py-2">
        <span class="navbar-brand text-muted fw-bold">
            <i class="fas fa-clinic-medical text-primary me-2"></i> Dashboard Administrativo
        </span>
      </div>
    </header>

    <main class="content-router">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
