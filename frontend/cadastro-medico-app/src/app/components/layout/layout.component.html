<div class="d-flex" style="font-family: 'Inter', sans-serif;">
  <!-- Sidebar -->
  <nav [class.sidebar]="sidebarOpen" [class.sidebar-closed]="!sidebarOpen">
    <div class="sidebar-header">
      <div class="brand" *ngIf="sidebarOpen">
        <i class="fas fa-heartbeat brand-icon"></i>
        <h3>MediCare</h3>
      </div>
      <div class="brand" *ngIf="!sidebarOpen">
         <i class="fas fa-heartbeat brand-icon"></i>
      </div>
      <button class="toggle-btn" (click)="toggleSidebar()">
        <i class="fas fa-bars" *ngIf="sidebarOpen"></i>
        <i class="fas fa-chevron-right" *ngIf="!sidebarOpen"></i>
      </button>
    </div>

    <div class="nav-container">
      <ul class="nav flex-column">
        <li class="nav-item" *ngIf="isAdmin || isMedico">
          <a class="nav-link" routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
            <i class="fas fa-chart-pie"></i>
            <span *ngIf="sidebarOpen">Dashboard</span>
          </a>
        </li>
        <li class="nav-item" *ngIf="isAdmin">
          <a class="nav-link" routerLink="/pacientes" routerLinkActive="active">
            <i class="fas fa-user-injured"></i>
            <span *ngIf="sidebarOpen">Pacientes</span>
          </a>
        </li>
        <li class="nav-item" *ngIf="isAdmin || isPaciente">
          <a class="nav-link" routerLink="/doutores" routerLinkActive="active">
            <i class="fas fa-user-md"></i>
            <span *ngIf="sidebarOpen">Doutores</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/consultas" routerLinkActive="active">
            <i class="fas fa-calendar-check"></i>
            <span *ngIf="sidebarOpen">Consultas</span>
          </a>
        </li>
        <li class="nav-item" *ngIf="isAdmin">
          <a class="nav-link" routerLink="/usuarios" routerLinkActive="active">
            <i class="fas fa-users-cog"></i>
            <span *ngIf="sidebarOpen">Usuários</span>
          </a>
        </li>
        <li class="nav-item" *ngIf="isAdmin">
          <a class="nav-link" routerLink="/empresas" routerLinkActive="active">
            <i class="fas fa-building"></i>
            <span *ngIf="sidebarOpen">Empresas</span>
          </a>
        </li>
      </ul>
    </div>

    <div class="user-menu">
      <button class="logout-btn" (click)="logout()">
        <i class="fas fa-sign-out-alt"></i>
        <span *ngIf="sidebarOpen">Sair do Sistema</span>
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="main-content">
    <header class="top-navbar sticky-top d-flex justify-content-between align-items-center mb-0">
      <div class="navbar-brand-custom">
          <i class="fas fa-clinic-medical me-2"></i> 
          <span>Sistema Gerencial</span>
      </div>
      <div class="user-profile">
        <div class="d-none d-md-flex align-items-center text-muted small me-2">
           <i class="fas fa-bell me-3" style="font-size: 1.2rem; cursor: pointer; transition: color 0.3s ease;" onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='currentColor'"></i>
        </div>
        <div class="user-avatar shadow-sm">
          <i class="fas fa-user"></i>
        </div>
      </div>
    </header>

    <main class="content-router">
      <div class="container-fluid p-0">
         <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
